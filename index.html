<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUK90</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ececec;
    font-family:Arial, Helvetica, sans-serif;
    padding:40px 20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.logo{
    width:350px;
    max-width:90%;
    margin-bottom:20px;
}

h1{
    color:#1e40af;
    font-size:4rem;
    margin-bottom:15px;
}

.subtitol{
    font-size:1.4rem;
    color:#333;
    margin-bottom:40px;
}

.botons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.boto{
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:18px 35px;
    border-radius:15px;
    font-size:1.2rem;
    transition:.2s;
}

.boto:hover{
    transform:translateY(-3px);
    background:#1d4ed8;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#444;
}

footer a{
    color:#2563eb;
    text-decoration:none;
}

@media (max-width:768px){

    h1{
        font-size:2.5rem;
    }

    .subtitol{
        font-size:1.1rem;
    }

    .card{
        padding:30px 20px;
    }

    .logo{
        width:250px;
    }

    .botons{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="card">

    <img src="logo.png" alt="Logo CHUK90" class="logo">

    <h1>Carles Albuixech</h1>

    <p class="subtitol">
        Mestre de Primària · Recursos Educatius · IA · ESDE
    </p>

    <div class="botons">

        <a href="/apps/" class="boto">
            Portal d'Apps
        </a>

        <a href="/esde/" class="boto">
            ESDE
        </a>

        <a href="/recursos/" class="boto">
            Recursos
        </a>

    </div>

</div>

<footer>
    <p>
        © 2026 Carles Albuixech ·
        <a href="https://chuk90.com">chuk90.com</a>
    </p>
</footer>

</body>
</html>
